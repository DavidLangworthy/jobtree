---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: leases.rq.davidlangworthy.io
spec:
  group: rq.davidlangworthy.io
  names:
    kind: Lease
    listKind: LeaseList
    plural: leases
    singular: lease
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.runRef.name
      name: Run
      type: string
    - jsonPath: .spec.slice.role
      name: Role
      type: string
    - jsonPath: .spec.interval.start
      name: Start
      type: string
    - jsonPath: .status.closed
      name: Closed
      type: boolean
    - jsonPath: .status.closureReason
      name: Reason
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          Lease records immutable consumption facts.
          An OPEN lease charges a budget and holds GPUs; make that the first thing
          `kubectl get` shows (R11).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: LeaseSpec is immutable after creation.
            properties:
              compPath:
                items:
                  type: string
                type: array
              interval:
                description: LeaseInterval timestamps the lease.
                properties:
                  end:
                    format: date-time
                    type: string
                  start:
                    format: date-time
                    type: string
                required:
                - start
                type: object
              owner:
                type: string
              paidByBudget:
                description: |-
                  PaidByBudget scopes PaidByEnvelope: envelope names are only unique
                  within one budget, and one owner can hold several budgets. Empty on
                  leases written before the field existed; those fall back to
                  owner+envelope attribution.
                type: string
              paidByBudgetNamespace:
                description: |-
                  PaidByBudgetNamespace scopes PaidByBudget: Budgets are namespaced, so the
                  budget name alone does not identify one — two tenants can each own a Budget
                  of the same name in their own namespace. The funding index keys on all three
                  (namespace, budget, envelope); without the namespace their envelopes collide
                  and one tenant charges the other (Codex #1 / task #62). Empty on leases
                  written before the field existed; the funding fold treats an empty namespace
                  as its own key, so legacy leases keep matching legacy (empty-namespace)
                  index entries and are not silently re-pointed.
                type: string
              paidByEnvelope:
                type: string
              reason:
                type: string
              runRef:
                description: RunReference links to the Run.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              slice:
                description: LeaseSlice describes the bound nodes.
                properties:
                  nodes:
                    items:
                      type: string
                    type: array
                  role:
                    type: string
                required:
                - nodes
                - role
                type: object
            required:
            - interval
            - owner
            - paidByEnvelope
            - reason
            - runRef
            - slice
            type: object
          status:
            description: LeaseStatus captures closure state.
            properties:
              closed:
                type: boolean
              closureReason:
                type: string
              conditions:
                description: |-
                  Conditions mirrors Closed/ClosureReason as Active/Closed conditions (R11)
                  so an open lease — the object that charges a budget and holds GPUs — is
                  selectable and waitable. SetLeaseConditions DERIVES these from the two
                  fields below; it never writes them, because controllers.CloseLease is the
                  sole closer and hack/antifake enforces it.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              ended:
                format: date-time
                type: string
            required:
            - closed
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
