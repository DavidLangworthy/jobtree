---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: runs.rq.davidlangworthy.io
spec:
  group: rq.davidlangworthy.io
  names:
    kind: Run
    listKind: RunList
    plural: runs
    singular: run
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.owner
      name: Owner
      type: string
    - jsonPath: .spec.resources.totalGPUs
      name: GPUs
      type: integer
    name: v1
    schema:
      openAPIV3Schema:
        description: Run captures the researcher-friendly request.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RunSpec defines the desired Run behavior.
            properties:
              follow:
                description: |-
                  RunFollow makes a run wait for other runs in the same namespace to complete
                  before it is admitted — a "job forest" of runs joined by follow edges. All
                  runs in After must reach Completed. If one fails (or is deleted),
                  onUpstreamFailure decides: "wait" (default) keeps this run Waiting for a
                  grace period so the researcher can fix and resubmit the failed stage, then
                  fails it; "fail" fails this run immediately.
                properties:
                  after:
                    items:
                      type: string
                    type: array
                  onUpstreamFailure:
                    enum:
                    - ""
                    - wait
                    - fail
                    type: string
                  upstreamFailureGrace:
                    type: string
                required:
                - after
                type: object
              funding:
                description: RunFunding captures borrowing intents.
                properties:
                  allowBorrow:
                    type: boolean
                  maxBorrowGPUs:
                    format: int32
                    type: integer
                  sponsors:
                    items:
                      type: string
                    type: array
                required:
                - allowBorrow
                type: object
              locality:
                description: RunLocality captures placement preferences.
                properties:
                  allowCrossGroupSpread:
                    type: boolean
                  groupGPUs:
                    format: int32
                    type: integer
                type: object
              malleable:
                description: RunMalleability allows elastic scaling.
                properties:
                  desiredTotalGPUs:
                    format: int32
                    type: integer
                  maxTotalGPUs:
                    format: int32
                    type: integer
                  minTotalGPUs:
                    format: int32
                    type: integer
                  stepGPUs:
                    format: int32
                    type: integer
                required:
                - maxTotalGPUs
                - minTotalGPUs
                - stepGPUs
                type: object
              owner:
                type: string
              resources:
                description: RunResources describes GPU requirements.
                properties:
                  gpuType:
                    type: string
                  totalGPUs:
                    format: int32
                    type: integer
                required:
                - gpuType
                - totalGPUs
                type: object
              roles:
                description: |-
                  Roles is the researcher's real workload: one homogeneous pod pool per
                  role, each lowering to a single JobSet ReplicatedJob (see pkg/lowering
                  and Option C in docs/project/borrow-vs-build.md). v1 admits exactly one
                  role; the field is a list so heterogeneous multi-role Runs (RL
                  gang-of-gangs: trainer/sampler/grader) land later as a purely additive,
                  non-breaking change (borrow-vs-build.md §2.2, growth path Option A).

                  Roles is optional during the JOBSET-1..JOBSET-9 transition: a Run with no
                  role still follows the legacy pause-pod materialization path. It becomes
                  the sole workload surface once the pause path is retired (JOBSET-9).
                items:
                  description: |-
                    RunRole is one homogeneous pool of pods within a Run — the unit that lowers
                    to a single JobSet ReplicatedJob (roles → replicatedJobs). It carries the
                    per-role workload template plus the width/topology/spare knobs that were
                    previously spread across RunSpec, so a future multi-role Run can size each
                    role independently.
                  properties:
                    gpusPerPod:
                      description: |-
                        GPUsPerPod is the nvidia.com/gpu request (== limit, extended resources
                        are non-overcommit) injected on the GPU-target container of each pod.
                        Must be positive; the zero-GPU CPU-only role path is a later addition.
                      format: int32
                      type: integer
                    groupGPUs:
                      description: |-
                        GroupGPUs optionally overrides spec.locality.groupGPUs for this role: the
                        number of GPUs packed into one fabric domain. Positive when set.
                      format: int32
                      type: integer
                    name:
                      description: |-
                        Name identifies the role (e.g. "trainer"). It becomes the JobSet
                        ReplicatedJob name and the gang-role label value, so it must be a
                        non-empty DNS label.
                      type: string
                    spares:
                      description: |-
                        Spares optionally overrides spec.sparesPerGroup for this role: hot spares
                        held per group for fast node-failure swap. Non-negative when set.
                      format: int32
                      type: integer
                    template:
                      description: |-
                        Template is the researcher's workload pod. jobtree deep-copies it per
                        materialized slice and overlays only the scheduling-owned fields
                        (schedulerName, nodeName is never set — Track A places it; the
                        nvidia.com/gpu limit; gang labels; rendezvous env; restartPolicy=Never).
                        Everything else — image, command, env, volumes, resources — is the
                        researcher's and is preserved verbatim.

                        The field is marked PreserveUnknownFields so controller-gen does NOT
                        inline the (hundreds-of-KB) PodTemplateSpec OpenAPI schema into the CRD —
                        that would blow the 262144-byte last-applied-configuration annotation
                        limit under `kubectl apply`. The template is validated in the webhook
                        (>=1 container, non-empty image on the GPU-target container, no
                        jobtree-owned fields) instead of by the apiserver's structural schema.
                      x-kubernetes-preserve-unknown-fields: true
                    width:
                      description: |-
                        Width is the number of pods in this role's gang — the JobSet
                        parallelism/completions. Must be positive. Width*GPUsPerPod must equal
                        the Run's Resources.TotalGPUs in v1 (single role).
                      format: int32
                      type: integer
                  required:
                  - gpusPerPod
                  - name
                  - template
                  - width
                  type: object
                type: array
              runtime:
                description: RunRuntime covers runtime behavior hints.
                properties:
                  checkpoint:
                    type: string
                type: object
              sparesPerGroup:
                format: int32
                type: integer
            required:
            - owner
            - resources
            type: object
          status:
            description: RunStatus reports lifecycle information.
            properties:
              earliestStart:
                format: date-time
                type: string
              eta:
                description: |-
                  RunETA is an optional, best-effort estimate of when the run will finish. It
                  is observability only — nothing in scheduling reads it and there is no
                  penalty for omitting it. The workload reports it (a pod annotation the
                  controller mirrors, source "job"); the CLI can set it directly (source
                  "controller").
                properties:
                  estimatedCompletion:
                    format: date-time
                    type: string
                  reportedAt:
                    format: date-time
                    type: string
                  source:
                    type: string
                required:
                - estimatedCompletion
                type: object
              followDeadline:
                description: |-
                  FollowDeadline is set while the run waits on a failed upstream under the
                  "wait" policy: if the upstream is not resolved by then, the run fails.
                format: date-time
                type: string
              funding:
                description: |-
                  RunFundingStatus reports the derived funding classification (R14/R15):
                  current width and accrued GPU-hours per class. Classes are computed by the
                  funding derivation from budgets, leases, and the clock — they are status
                  only and never feed back into evaluation.
                properties:
                  borrowedGPUHours:
                    type: number
                  borrowedGPUs:
                    format: int32
                    type: integer
                  lenders:
                    items:
                      description: |-
                        RunFundingLenderShare attributes shared or borrowed capacity to the owner
                        whose envelope funds it (family lender or sponsor).
                      properties:
                        gpuHours:
                          type: number
                        gpus:
                          format: int32
                          type: integer
                        owner:
                          type: string
                      required:
                      - owner
                      type: object
                    type: array
                  ownedGPUHours:
                    type: number
                  ownedGPUs:
                    format: int32
                    type: integer
                  sharedGPUHours:
                    type: number
                  sharedGPUs:
                    format: int32
                    type: integer
                  unfundedGPUHours:
                    type: number
                  unfundedGPUs:
                    format: int32
                    type: integer
                type: object
              generation:
                format: int64
                type: integer
              message:
                type: string
              pendingReservation:
                type: string
              phase:
                type: string
              width:
                description: RunWidthStatus summarises elastic width bookkeeping.
                properties:
                  allocated:
                    format: int32
                    type: integer
                  desired:
                    format: int32
                    type: integer
                  max:
                    format: int32
                    type: integer
                  min:
                    format: int32
                    type: integer
                  pending:
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
