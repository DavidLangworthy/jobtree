---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: reservations.rq.davidlangworthy.io
spec:
  group: rq.davidlangworthy.io
  names:
    kind: Reservation
    listKind: ReservationList
    plural: reservations
    singular: reservation
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.runRef.name
      name: Run
      type: string
    - jsonPath: .spec.earliestStart
      name: Earliest
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: Reservation plans future consumption.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ReservationSpec captures the immutable plan.

              R14: a Reservation's spec is immutable for the same reason a lease's is — it is a
              promise the resolver has already planned around — and that immutability now holds
              at the apiserver, not only in the webhook. The intendedSlice rule is the webhook's
              own cross-field check moved down to where it cannot be bypassed.
            properties:
              earliestStart:
                format: date-time
                type: string
              intendedSlice:
                description: IntendedSlice defines the target topology.
                properties:
                  domain:
                    additionalProperties:
                      type: string
                    type: object
                  nodes:
                    items:
                      type: string
                    type: array
                type: object
              payingEnvelope:
                minLength: 1
                type: string
              runRef:
                description: RunReference links to the Run.
                properties:
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
            required:
            - earliestStart
            - intendedSlice
            - payingEnvelope
            - runRef
            type: object
            x-kubernetes-validations:
            - message: spec.intendedSlice must set nodes or domain
              rule: has(self.intendedSlice.nodes) || has(self.intendedSlice.domain)
          status:
            description: ReservationStatus reports lifecycle transitions.
            properties:
              activatedAt:
                format: date-time
                type: string
              canceledAt:
                format: date-time
                type: string
              conditions:
                description: |-
                  Conditions reports Forecast/Activated (R11), derived by
                  SetReservationConditions from the fields below.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              countdownSeconds:
                format: int64
                type: integer
              forecast:
                description: ReservationForecast communicates expected activation
                  details.
                properties:
                  confidence:
                    type: string
                  deficitGPUs:
                    format: int32
                    type: integer
                  remedies:
                    items:
                      type: string
                    type: array
                  scope:
                    additionalProperties:
                      type: string
                    type: object
                type: object
              reason:
                type: string
              releasedAt:
                format: date-time
                type: string
              state:
                type: string
            type: object
        type: object
        x-kubernetes-validations:
        - message: spec is immutable; cancel and recreate for changes
          rule: self.spec == oldSelf.spec
    served: true
    storage: true
    subresources:
      status: {}
