name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # The job NAME is the status-check context a branch rule requires, so it must
  # be unique across workflows: `docs` also had a job named `build`, which made
  # "require the CI check" impossible to express — two checks called `build`.
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      # `make envtest` shells out to setup-envtest, which downloads the
      # kube-apiserver/etcd binaries on every cold run. They are pinned by
      # ENVTEST_K8S_VERSION, so cache them on that key.
      - name: Cache envtest binaries
        uses: actions/cache@v6
        with:
          path: ~/.local/share/kubebuilder-envtest
          key: envtest-${{ runner.os }}-1.36.2
      # ONE command. `make verify` is the single definition of the gate, so CI
      # and a developer's pre-push check cannot drift apart. That drift is how a
      # local sweep that never ran envtest looked green while CI was red.
      - name: make verify
        run: make verify
