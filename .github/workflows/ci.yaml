name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Verify formatting
        run: |
          gofmt -w $(find . -name '*.go' -not -path './vendor/*')
          git diff --exit-code
      - name: Vet
        run: go vet ./...
      - name: Test (race detector)
        run: go test -race ./...
      - name: Build binaries
        run: |
          go build ./cmd/manager
          go build ./cmd/kubectl-runs
      - name: Helm lint
        run: helm lint deploy/helm/gpu-fleet
