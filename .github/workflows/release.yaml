name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # R15: this job did not exist, so no tag ever produced an image, while the
  # chart's defaults pointed at `ghcr.io/.../jobtree-controller:latest`. An
  # admin who followed the operator guide got ImagePullBackOff. Images are
  # pushed BEFORE the chart is packaged, and the chart is packaged with
  # --app-version set to this tag, so the published chart's default image tag
  # names images that already exist.
  images:
    runs-on: ubuntu-latest
    outputs:
      controller: ${{ steps.refs.outputs.controller }}
      scheduler: ${{ steps.refs.outputs.scheduler }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve image references
        id: refs
        run: |
          set -euo pipefail
          # ghcr.io rejects an uppercase path; GITHUB_REPOSITORY_OWNER is not
          # normalised for us.
          owner="$(tr '[:upper:]' '[:lower:]' <<<"${GITHUB_REPOSITORY_OWNER}")"
          {
            echo "registry=ghcr.io/${owner}"
            echo "controller=ghcr.io/${owner}/jobtree-controller"
            echo "scheduler=ghcr.io/${owner}/jobtree-scheduler"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # One Dockerfile, two targets sharing a builder stage (see Dockerfile).
      # `latest` moves with the newest tag; the version tag is the immutable
      # one the chart defaults to.
      - name: Build and push the controller manager image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: manager
          push: true
          tags: |
            ${{ steps.refs.outputs.controller }}:${{ github.ref_name }}
            ${{ steps.refs.outputs.controller }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push the scheduler image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: scheduler
          push: true
          tags: |
            ${{ steps.refs.outputs.scheduler }}:${{ github.ref_name }}
            ${{ steps.refs.outputs.scheduler }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  package:
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'

      - name: Build cross-platform kubectl-runs archives
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          # The krew manifest below points at exactly these archives; keep the
          # platform list and naming in sync (R23).
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${platform%/*}"; arch="${platform#*/}"
            out="dist/kubectl-runs_${VERSION}_${os}_${arch}"
            mkdir -p "$out"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -o "$out/kubectl-runs" ./cmd/kubectl-runs
            cp LICENSE "$out/" 2>/dev/null || true
            tar -czf "${out}.tar.gz" -C "$out" .
            rm -rf "$out"
          done
          ( cd dist && sha256sum kubectl-runs_*.tar.gz > checksums.txt )

      - name: Generate krew manifest with release checksums
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"
          sha() { awk -v f="$1" '$2==f {print $1}' dist/checksums.txt; }
          {
            echo "apiVersion: krew.googlecontainertools.github.com/v1alpha2"
            echo "kind: Plugin"
            echo "metadata:"
            echo "  name: runs"
            echo "spec:"
            echo "  version: ${VERSION}"
            echo "  shortDescription: \"Interact with Jobtree Run, Reservation, and GPULease CRDs\""
            echo "  homepage: https://github.com/davidlangworthy/jobtree"
            echo "  platforms:"
            for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
              os="${platform%/*}"; arch="${platform#*/}"
              file="kubectl-runs_${VERSION}_${os}_${arch}.tar.gz"
              echo "    - selector:"
              echo "        matchLabels:"
              echo "          os: ${os}"
              echo "          arch: ${arch}"
              echo "      uri: ${base}/${file}"
              echo "      sha256: $(sha "$file")"
              echo "      files:"
              echo "        - from: kubectl-runs"
              echo "          to: ."
              echo "      bin: kubectl-runs"
            done
            echo "  description: |"
            echo "    The runs plugin submits, plans, watches, and explains GPU research"
            echo "    runs managed by Jobtree against Run, Reservation, and GPULease CRDs."
          } > dist/runs.yaml

      - name: Validate krew manifest
        run: |
          set -euo pipefail
          curl -fsSLO "https://github.com/kubernetes-sigs/krew/releases/latest/download/krew-linux_amd64.tar.gz"
          tar -xzf krew-linux_amd64.tar.gz
          ./krew-linux_amd64 install --manifest=dist/runs.yaml --archive=dist/kubectl-runs_${GITHUB_REF_NAME}_linux_amd64.tar.gz

      - name: Lint and package Helm chart
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          helm lint deploy/helm/gpu-fleet
          # --app-version is load-bearing, not cosmetic: the chart's image tag
          # defaults to .Chart.AppVersion (deploy/helm/gpu-fleet/templates/
          # _helpers.tpl), and the `images` job above pushed exactly this tag.
          # Package it wrong and the published chart pulls an image that does
          # not exist — the R15 failure, one layer up.
          helm package deploy/helm/gpu-fleet --destination dist \
            --version "${VERSION#v}" --app-version "$VERSION"

          # Prove the two agree rather than assuming it.
          owner="$(tr '[:upper:]' '[:lower:]' <<<"${GITHUB_REPOSITORY_OWNER}")"
          rendered="$(helm template rel "dist/gpu-fleet-${VERSION#v}.tgz" --set scheduler.enabled=true)"
          for want in \
            "ghcr.io/${owner}/jobtree-controller:${VERSION}" \
            "ghcr.io/${owner}/jobtree-scheduler:${VERSION}"; do
            if ! grep -qF "image: $want" <<<"$rendered"; then
              echo "::error::packaged chart does not default to $want" >&2
              exit 1
            fi
          done

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/kubectl-runs_*.tar.gz
            dist/checksums.txt
            dist/runs.yaml
            dist/*.tgz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: dist
