name: Specs

on:
  pull_request:
    paths:
      - 'specs/ReservationLifecycle*'
      - 'specs/BudgetConservation*'
      - 'specs/QuotaEvaluation*'
      - 'Makefile'
  push:
    branches: [ main ]
    paths:
      - 'specs/ReservationLifecycle*'
      - 'specs/BudgetConservation*'
      - 'specs/QuotaEvaluation*'
      - 'Makefile'

jobs:
  tlc:
    name: specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Model-check the specs
        run: make spec-check
      - name: Demonstrate the historical counterexamples
        run: make spec-counterexamples
