name: docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'MAINTAINERS.md'
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

jobs:
  build:
    # Unique status-check context (see ci.yaml): this must not be `build`.
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - run: pip install -r docs/requirements.txt
      - run: mkdocs build --strict
