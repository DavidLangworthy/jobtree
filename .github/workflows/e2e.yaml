name: e2e

# The kind e2e harness (Track F — TESTINFRA-1/2/7,
# docs/project/make-it-real-plan.md): real API server, real manager, real
# webhooks, real kubelet. This is a *named*, required-on-main job — not a
# best-effort/allow-failure one — because the whole point of Track F is that
# faking passage must be structurally hard. As of this workflow landing,
# three test/e2e cases are *expected* skips (blocked on Track B/JOBSET; see
# test/e2e/completion_test.go and follow_test.go) — that is the honest,
# documented state, not a gap in this workflow.
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  kind-e2e:
    name: kind e2e (real cluster)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      # BuildKit with a cross-run layer cache. The image build was 210s of a
      # 307s job: two Dockerfiles each re-downloaded the modules and recompiled
      # the whole dependency graph from cold, every run. One builder stage
      # (Dockerfile, two targets) plus a persistent cache makes the second image
      # nearly free and the first mostly a cache restore.
      - uses: docker/setup-buildx-action@v3
      # Exports ACTIONS_RUNTIME_TOKEN / ACTIONS_CACHE_URL so `type=gha` works
      # from a raw `docker buildx build` (build-push-action would set these
      # itself, but we drive the build through `make e2e-build` so that CI and a
      # developer's local build stay the same command).
      - uses: crazy-max/ghaction-github-runtime@v3

      - name: Install kind
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source hack/e2e/versions.env
          KIND_VERSION="v0.32.0"
          # /usr/local/bin/kind is pre-installed on the runner owned by root, so
          # a plain chmod fails ("Operation not permitted"). Install our pinned
          # version as root into a scratch path and move it into place.
          curl -fsSLo "${RUNNER_TEMP}/kind" "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x "${RUNNER_TEMP}/kind"
          sudo mv "${RUNNER_TEMP}/kind" /usr/local/bin/kind
          kind version

      - uses: azure/setup-helm@v4
        with:
          version: 'v3.16.4'

      # The cluster is needed only to LOAD the images, so stand it up WHILE they
      # build. `wait` propagates kind-up's exit status, so a broken cluster still
      # fails the job rather than surfacing later as a confusing load error.
      - name: kind-up and image build (concurrent)
        env:
          DOCKER_BUILD: >-
            docker buildx build --load
            --cache-from type=gha,scope=jobtree-e2e
            --cache-to type=gha,mode=max,scope=jobtree-e2e
        run: |
          set -euo pipefail
          make kind-up & kind_pid=$!
          make e2e-build
          wait "$kind_pid"

      - name: Load images into kind
        run: make e2e-load

      - name: Install the real chart (deploy/helm/gpu-fleet + e2e values overlay)
        run: hack/e2e/install.sh

      - name: Run test/e2e (build tag e2e)
        env:
          JOBTREE_E2E_NAMESPACE: jobtree-system
        run: go test ./test/e2e/... -tags=e2e -v -count=1

      - name: Dump cluster diagnostics
        if: failure()
        run: hack/e2e/diagnostics.sh

      - name: kind-down
        if: always()
        run: make kind-down
