name: weekly maintenance

# The Tuesday fix-up. Runs on GitHub's infrastructure, so it does not depend on
# anyone's laptop being on, and it does not expire.
#
# It exists so that dependency hygiene costs one review sitting per week instead
# of a stream of notifications. It abides by the rules in
# docs/project/weekly-maintenance.md, of which the load-bearing ones are:
#
#   * FAIL CLOSED. The gate is `make verify` -- the same single definition CI
#     uses. If it fails, nothing is merged and this run goes red.
#   * NEVER auto-merge a Go module bump. It can change funding behaviour, and the
#     golden oracle captures class widths and lenders, not GPU-hour floats: green
#     is not the same as correct. Those get a `needs-human` label.
#   * ALWAYS report, even when everything is green. A week with no comment means
#     the workflow did not run, and that must be visible. Silence is not consent.

on:
  schedule:
    # Tuesdays, 13:17 UTC. Deliberately off the hour: every repo that asks for
    # "Tuesday" gets `0 13`, and they all land on the API at the same instant.
    - cron: '17 13 * * 2'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: weekly-maintenance
  cancel-in-progress: false

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    outputs:
      flakes: ${{ steps.flake.outputs.failures }}
      vuln_new: ${{ steps.vuln.outputs.new }}
      vuln_allowlisted: ${{ steps.vuln.outputs.allowlisted }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
      - name: Cache envtest binaries
        uses: actions/cache@v6
        with:
          path: ~/.local/share/kubebuilder-envtest
          key: envtest-${{ runner.os }}-1.36.2

      # The single definition of the gate. Not a bespoke list of checks that
      # could drift from what a developer runs.
      - name: make verify
        run: make verify

      # A stability probe, not a gate. It was added to measure task #36 -- a stale
      # node-failure reconcile closing a healthy node's leases. That MECHANISM was
      # fixed on 2026-07-09: NotReady is no longer treated as a failure at all, so
      # no node event can close a healthy node's leases.
      #
      # A DIFFERENT intermittent remains (task #39): TestETAMirroredFromPodAnnotation
      # timed out once in CI waiting 30s for a run to reach Running. It has not
      # reproduced locally. Until it is understood, this probe's count is the
      # measurement -- not proof of anything either way.
      - name: envtest stability probe (3x)
        id: flake
        if: always()
        run: |
          set +e
          fails=0
          for i in 1 2 3; do
            if ! make envtest > "/tmp/envtest-$i.log" 2>&1; then
              fails=$((fails + 1))
              echo "--- envtest run $i FAILED (tail) ---"
              tail -30 "/tmp/envtest-$i.log"
            fi
          done
          echo "failures=$fails" >> "$GITHUB_OUTPUT"
          if [ "$fails" -gt 0 ]; then
            echo "::warning::envtest failed ${fails}/3 probe runs — #36's mechanism is fixed; see task #39 before calling this a known flake"
          fi

      # Which advisories can our code actually CALL. Dependabot counts everything
      # in go.sum; on this repo the two numbers have differed by an order of
      # magnitude. Reporting the reachable set is the difference between "14 alerts"
      # and "one thing to do". Never a gate: a Sunday advisory must not redden an
      # unrelated Monday pull request. That is what batching is for.
      - name: reachable vulnerabilities (govulncheck)
        id: vuln
        if: always()
        run: |
          set +e
          hack/ci/govulncheck.sh | tee /tmp/vuln.txt
          summary="$(grep '^SUMMARY ' /tmp/vuln.txt | tail -1)"
          echo "new=$(awk '{print $2}' <<<"$summary")"          >> "$GITHUB_OUTPUT"
          echo "allowlisted=$(awk '{print $3}' <<<"$summary")"  >> "$GITHUB_OUTPUT"

  triage:
    name: triage and report
    needs: gate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Merge what is safe, hold what is not, and say so
        env:
          GH_TOKEN: ${{ github.token }}
          GATE_RESULT: ${{ needs.gate.result }}
          ENVTEST_FLAKES: ${{ needs.gate.outputs.flakes }}
          VULN_NEW: ${{ needs.gate.outputs.vuln_new }}
          VULN_ALLOWLISTED: ${{ needs.gate.outputs.vuln_allowlisted }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: .github/scripts/weekly-maintenance.sh
