\* Counterexample for the pre-#91 COUNT-BASED spare top-up: fill indices
\* existing..count-1 instead of the genuinely-missing names.  An out-of-order
\* spare loss (the fuzzer's deletePod) makes it rebuild an index a survivor
\* still owns: two pods, then two open leases, of one name.
\* Expected violation: NoDuplicateSpareName.
\* Current Go rail: the `present` map in controllers/run_controller.go:2435-2456.
SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
  Capacity = 4
  RequireFence = TRUE
  SlotGranularReclaim = TRUE
  SparePassFirst = TRUE
  ReleaseSpareOnDecline = TRUE
  TrackedPhases = TRUE
  EvictBothPlanes = TRUE
  TopUpSpares = TRUE
  CountBasedTopUp = TRUE
  ConsumedSpareByName = TRUE
  ExternalDeletes = TRUE

INVARIANTS
  TypeOK
  NoDuplicateRank
  NoOverdraft
  ReclaimIsSlotExactAndUnfunded
  FailedNodeFullyHandled
  TerminalHoldsNothing
  PhaseIsJoin
  PlaneAgreement
  NoDuplicateSpareName
  ConsumedSpareStaysConsumed
  SpareWidthAccounted
