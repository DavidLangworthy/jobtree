\* Counterexample for the CURRENT Go top-up (post-#91): presence is keyed by
\* name, but consumedSpareCount (controllers/run_controller.go:2502-2513) is a
\* raw COUNT that truncates the fill range `0..count-1` from the TOP.  A swap
\* that consumed a LOW spare index leaves that index inside the range with its
\* pod absent, so the top-up resurrects the consumed spare — capacity the swap
\* lease is already spending.
\* Expected violation: ConsumedSpareStaysConsumed (SpareWidthAccounted also
\* breaks on the same states).
SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
  Capacity = 4
  RequireFence = TRUE
  SlotGranularReclaim = TRUE
  SparePassFirst = TRUE
  ReleaseSpareOnDecline = TRUE
  TrackedPhases = TRUE
  EvictBothPlanes = TRUE
  TopUpSpares = TRUE
  CountBasedTopUp = FALSE
  ConsumedSpareByName = FALSE
  ExternalDeletes = TRUE

INVARIANTS
  TypeOK
  NoDuplicateRank
  NoOverdraft
  ReclaimIsSlotExactAndUnfunded
  FailedNodeFullyHandled
  TerminalHoldsNothing
  PhaseIsJoin
  PlaneAgreement
  NoDuplicateSpareName
  ConsumedSpareStaysConsumed
  SpareWidthAccounted
