---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: budgets.rq.davidlangworthy.io
spec:
  group: rq.davidlangworthy.io
  names:
    kind: Budget
    listKind: BudgetList
    plural: budgets
    singular: budget
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.owner
      name: Owner
      type: string
    - jsonPath: .status.updatedAt
      name: Updated
      type: date
    - jsonPath: .status.conditions[?(@.type=="Healthy")].status
      name: Healthy
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: Budget represents the allocation envelopes that constrain Runs.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BudgetSpec describes available resource envelopes for a particular
              owner.
            properties:
              aggregateCaps:
                items:
                  description: AggregateCap bounds the sum across envelopes.
                  properties:
                    envelopes:
                      items:
                        type: string
                      type: array
                    flavor:
                      type: string
                    maxConcurrency:
                      format: int32
                      type: integer
                    maxGPUHours:
                      format: int64
                      type: integer
                    name:
                      type: string
                  required:
                  - envelopes
                  - flavor
                  - name
                  type: object
                type: array
              autoRenew:
                description: AutoRenewSchedule defines reporting rotation for open-ended
                  envelopes.
                properties:
                  notifyBefore:
                    type: string
                  period:
                    type: string
                required:
                - notifyBefore
                - period
                type: object
              envelopes:
                items:
                  description: BudgetEnvelope defines a location/time scoped limit.
                  properties:
                    concurrency:
                      format: int32
                      type: integer
                    end:
                      format: date-time
                      type: string
                    flavor:
                      type: string
                    lending:
                      description: LendingPolicy specifies optional lending configuration.
                      properties:
                        allow:
                          type: boolean
                        maxConcurrency:
                          format: int32
                          type: integer
                        maxGPUHours:
                          format: int64
                          type: integer
                        to:
                          items:
                            type: string
                          type: array
                      required:
                      - allow
                      type: object
                    maxGPUHours:
                      format: int64
                      type: integer
                    name:
                      type: string
                    preActivation:
                      description: PreActivationPolicy controls reservation/admission
                        before start.
                      properties:
                        allowAdmission:
                          type: boolean
                        allowReservations:
                          type: boolean
                      required:
                      - allowAdmission
                      - allowReservations
                      type: object
                    selector:
                      additionalProperties:
                        type: string
                      type: object
                    sharing:
                      description: |-
                        Sharing controls family access to this envelope's excess: "" or
                        "family" allows it, "none" opts out.
                      enum:
                      - ""
                      - family
                      - none
                      type: string
                    start:
                      format: date-time
                      type: string
                  required:
                  - concurrency
                  - flavor
                  - name
                  - selector
                  type: object
                type: array
              owner:
                type: string
              parents:
                items:
                  type: string
                type: array
            required:
            - envelopes
            - owner
            type: object
          status:
            description: BudgetStatus surfaces derived accounting data.
            properties:
              aggregateHeadroom:
                items:
                  description: AggregateHeadroom reports remaining capacity for an
                    aggregate cap.
                  properties:
                    concurrency:
                      format: int32
                      type: integer
                    flavor:
                      type: string
                    gpuHours:
                      format: int64
                      type: integer
                    name:
                      type: string
                  required:
                  - flavor
                  - name
                  type: object
                type: array
              conditions:
                description: |-
                  Conditions reports Healthy/Overcommitted (R11), derived by
                  SetBudgetConditions from the headroom written in the same pass.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              headroom:
                items:
                  description: EnvelopeHeadroom reports remaining capacity for an
                    envelope.
                  properties:
                    concurrency:
                      format: int32
                      type: integer
                    flavor:
                      type: string
                    gpuHours:
                      format: int64
                      type: integer
                    name:
                      type: string
                  required:
                  - concurrency
                  - flavor
                  - name
                  type: object
                type: array
              observedGeneration:
                format: int64
                type: integer
              pendingRenewals:
                description: |-
                  PendingRenewals lists envelopes whose window is closing within
                  spec.autoRenew.notifyBefore and have not yet been rotated by an
                  operator. Populated only when spec.autoRenew is set; an unset
                  AutoRenew always yields an empty list (the real, non-fabricated
                  reader of spec.autoRenew — see quota-semantics.md).
                items:
                  description: EnvelopeRenewalDue reports one envelope whose window
                    needs rotating.
                  properties:
                    end:
                      format: date-time
                      type: string
                    name:
                      type: string
                  required:
                  - end
                  - name
                  type: object
                type: array
              updatedAt:
                format: date-time
                type: string
              usage:
                items:
                  description: |-
                    EnvelopeUsage reports an envelope's width split by derived funding class
                    (R14/R15) plus the spare-role width, and its consumed integral. Unfunded
                    width names this envelope as payer but is never charged against its caps.
                  properties:
                    borrowedGPUs:
                      format: int32
                      type: integer
                    consumedGPUHours:
                      type: number
                    flavor:
                      type: string
                    name:
                      type: string
                    ownedGPUs:
                      format: int32
                      type: integer
                    sharedGPUs:
                      format: int32
                      type: integer
                    spareGPUs:
                      format: int32
                      type: integer
                    unfundedGPUs:
                      format: int32
                      type: integer
                  required:
                  - flavor
                  - name
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
