controller:
  image: ghcr.io/davidlangworthy/jobtree-controller:latest
  replicas: 1
  resources: {}
  serviceAccount: jobtree-controller
  metricsPort: 8080
  # healthPort serves the manager's liveness/readiness probes (:8081 by
  # default in cmd/manager). webhookPort is controller-runtime's serving
  # port (9443); the webhook Service targets it.
  healthPort: 8081
  webhookPort: 9443
  extraArgs: []

notifier:
  enabled: true
  image: ghcr.io/davidlangworthy/jobtree-notifier:latest
  replicas: 1
  resources: {}

scheduler:
  # The out-of-tree jobtree scheduler-framework binary (cmd/scheduler). It runs
  # as a second Deployment alongside the manager and places pods that set
  # schedulerName: jobtree. PLUGIN-1 ships it as a no-op scaffold (the plugin's
  # Filter/Score/Permit/PreBind/PostFilter bodies do nothing), so it is DISABLED
  # by default until PLUGIN-2+ makes placement real. Turning it on today would
  # place jobtree pods identically to the default scheduler.
  enabled: false
  image: ghcr.io/davidlangworthy/jobtree-scheduler:latest
  replicas: 1
  resources: {}
  serviceAccount: jobtree-scheduler
  # schedulerName pods must set to opt into this scheduler; must match the
  # profile name in the mounted KubeSchedulerConfiguration.
  schedulerName: jobtree
  # secureServingPort serves the scheduler's own HTTPS /healthz and /metrics.
  secureServingPort: 10259
  # Enable leader election only with replicas > 1; the config's leaderElect and
  # this flag must agree. A single replica needs neither.
  leaderElect: false
  extraArgs: []

monitoring:
  enabled: true
  scrapeInterval: 30s
  serviceMonitorNamespace: ""

webhook:
  # enabled must match the manager's --enable-webhooks (default true). When
  # true the chart provisions serving certs, a webhook Service, and the
  # Mutating/Validating webhook configurations with CA injection so the
  # deployed manager can actually admit objects (failurePolicy=Fail).
  enabled: true
  certSecretName: jobtree-webhook-cert
  # certValidityDays bounds the chart-generated self-signed serving cert.
  # helm regenerates it on each upgrade; for long-lived clusters supply a
  # cert-manager-issued secret of the same name and set generateCert=false.
  generateCert: true
  certValidityDays: 3650
  # caBundle is required only when generateCert=false: the base64-encoded CA
  # that signed your externally supplied serving cert. It is injected into the
  # webhook configurations so the apiserver trusts the manager's TLS. When
  # generateCert=true the chart derives this from its own generated CA.
  caBundle: ""

rbac:
  create: true

imagePullSecrets: []

nodeSelector: {}
tolerations: []
affinity: {}
