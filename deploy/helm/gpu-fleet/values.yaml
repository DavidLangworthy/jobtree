# Every image this chart deploys is built from the repository's single
# Dockerfile (two targets) and pushed by .github/workflows/release.yaml on a
# `v*` tag. `image.tag` is the one knob that pins a release across every
# component; empty means "the chart's appVersion", which the release workflow
# stamps to the tag it just published — so a chart pulled from a release
# already points at images that exist.
#
# This used to be a single `controller.image` string holding a full reference
# pinned at `:latest`, while the operator guide told admins to run
# `--set image.tag=$(git rev-parse --short HEAD)`. That key did not exist, so
# the flag was a silent no-op and every install got `:latest` — an image no CI
# job had ever pushed (R15). `hack/ci/helm-assertions.sh` now fails the build
# if `image.tag` stops reaching a rendered container.
image:
  tag: ""
  # Tags are immutable release versions, so IfNotPresent is correct and lets a
  # locally built/loaded image (kind, `make e2e`) be used without a registry.
  pullPolicy: IfNotPresent

controller:
  image:
    repository: ghcr.io/davidlangworthy/jobtree-controller
    # Empty inherits image.tag, then the chart appVersion.
    tag: ""
    # Empty inherits image.pullPolicy.
    pullPolicy: ""
  replicas: 1
  resources: {}
  serviceAccount: jobtree-controller
  # leaderElect MUST be true whenever replicas > 1. The engine serializes every
  # admission decision on one worker (specs/BudgetConservation.tla); two active
  # managers would each emit intent pods and write Run status against their own
  # view of the ledger. `hack/ci/helm-assertions.sh` fails the build if any
  # overlay sets replicas > 1 without it. A single replica needs neither.
  leaderElect: false
  metricsPort: 8080
  # healthPort serves the manager's liveness/readiness probes (:8081 by
  # default in cmd/manager). webhookPort is controller-runtime's serving
  # port (9443); the webhook Service targets it.
  healthPort: 8081
  webhookPort: 9443
  extraArgs: []

scheduler:
  # The out-of-tree jobtree scheduler-framework binary (cmd/scheduler). It runs
  # as a second Deployment alongside the manager and places pods that set
  # schedulerName: jobtree. As of PLUGIN-2 it is the REAL sole committer: Filter
  # gates flavor, Permit assembles the gang and gates funding, and PreBind mints
  # the Lease on the bound node. Left DISABLED by default so operators opt in
  # deliberately (it needs the -committer RBAC below and workload pods that set
  # schedulerName: jobtree with the gang/gpu metadata the controller stamps).
  enabled: false
  image:
    repository: ghcr.io/davidlangworthy/jobtree-scheduler
    tag: ""
    pullPolicy: ""
  replicas: 1
  resources: {}
  serviceAccount: jobtree-scheduler
  # schedulerName pods must set to opt into this scheduler; must match the
  # profile name in the mounted KubeSchedulerConfiguration.
  schedulerName: jobtree
  # secureServingPort serves the scheduler's own HTTPS /healthz and /metrics.
  secureServingPort: 10259
  # Enable leader election only with replicas > 1; the config's leaderElect and
  # this flag must agree. A single replica needs neither.
  leaderElect: false
  extraArgs: []

monitoring:
  enabled: true
  scrapeInterval: 30s
  serviceMonitorNamespace: ""

# podPolicy installs the ValidatingAdmissionPolicy that makes jobtree the
# mandatory, forgery-proof committer for GPU pods (R5/R6): GPU pods must use
# schedulerName: jobtree, and jobtree-owned scheduling fields are settable only
# by the controller ServiceAccount. Requires ValidatingAdmissionPolicy (GA in
# k8s 1.30+). Left OFF by default so a bare install does not gate every GPU pod
# in the cluster before the operator is ready — enabling it is what closes the
# opt-in-budget hole (see docs/operator-guide/admin-setup.md, R18 break-glass).
podPolicy:
  enabled: false
  # Fail (recommended): a policy/API outage blocks new GPU-pod creation rather
  # than silently allowing an unbudgeted bypass. The release namespace is always
  # exempt so the control plane can still come up. Set Ignore only if
  # availability must win over budget integrity during an outage.
  failurePolicy: Fail
  # Namespaces exempt from the mandatory-scheduler rule (in addition to the
  # always-exempt release namespace): device-plugin DaemonSets, other infra with
  # legitimate raw-GPU access.
  exemptNamespaces: []

webhook:
  # enabled must match the manager's --enable-webhooks (default true). When
  # true the chart provisions serving certs, a webhook Service, and the
  # Mutating/Validating webhook configurations with CA injection so the
  # deployed manager can actually admit objects (failurePolicy=Fail).
  enabled: true
  certSecretName: jobtree-webhook-cert
  # certValidityDays bounds the chart-generated self-signed serving cert.
  # helm regenerates it on each upgrade; for long-lived clusters supply a
  # cert-manager-issued secret of the same name and set generateCert=false.
  generateCert: true
  certValidityDays: 3650
  # caBundle is required only when generateCert=false: the base64-encoded CA
  # that signed your externally supplied serving cert. It is injected into the
  # webhook configurations so the apiserver trusts the manager's TLS. When
  # generateCert=true the chart derives this from its own generated CA.
  caBundle: ""

rbac:
  create: true

imagePullSecrets: []

nodeSelector: {}
tolerations: []
affinity: {}
