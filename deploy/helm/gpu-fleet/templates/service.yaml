apiVersion: v1
kind: Service
metadata:
  name: {{ include "gpu-fleet.controllerName" . }}
  labels: {{- include "gpu-fleet.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "gpu-fleet.controllerName" . }}
  ports:
    - name: metrics
      port: {{ .Values.controller.metricsPort }}
      targetPort: metrics
{{- if .Values.monitoring.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "gpu-fleet.controllerName" . }}
  labels: {{- include "gpu-fleet.labels" . | nindent 4 }}
  {{- if .Values.monitoring.serviceMonitorNamespace }}
  namespace: {{ .Values.monitoring.serviceMonitorNamespace }}
  {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gpu-fleet.controllerName" . }}
  endpoints:
    # controller-runtime serves its own metrics on /metrics; the engine's
    # hand-rolled exposition (admission latency, resolver actions, budget
    # usage) rides the same port under /jobtree. Scrape both or the engine
    # panels stay empty (R29).
    - port: metrics
      path: /metrics
      interval: {{ .Values.monitoring.scrapeInterval }}
    - port: metrics
      path: /jobtree
      interval: {{ .Values.monitoring.scrapeInterval }}
{{- end }}
