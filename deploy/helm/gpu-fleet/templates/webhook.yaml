{{- if .Values.webhook.enabled }}
{{- /*
The manager registers four admission webhooks and defaults --enable-webhooks
to true, so its webhook server must serve TLS. This template provisions the
serving cert, the webhook Service that fronts the manager's :9443, and the
Mutating/Validating webhook configurations (mirroring config/webhook/
manifests.yaml) with the CA injected — without which the deployed manager
admits nothing (failurePolicy=Fail). See R29.
*/ -}}
{{- $svc := printf "%s-webhook" (include "gpu-fleet.controllerName" .) -}}
{{- $fqdn := printf "%s.%s.svc" $svc .Release.Namespace -}}
{{- $days := int .Values.webhook.certValidityDays -}}
{{- $altNames := list $svc $fqdn (printf "%s.cluster.local" $fqdn) -}}
{{- $cert := dict -}}
{{- $caBundle := "" -}}
{{- if .Values.webhook.generateCert -}}
{{-   $ca := genCA (printf "%s-ca" $svc) $days -}}
{{-   $cert = genSignedCert $fqdn nil $altNames $days $ca -}}
{{-   $caBundle = $ca.Cert | b64enc -}}
{{- else -}}
{{- /* External serving cert (e.g. cert-manager): caBundle MUST be the CA that
signed it, or the apiserver's TLS handshake to the webhook fails. Require it
rather than injecting a mismatched freshly-generated CA. */ -}}
{{- $caBundle = required "webhook.caBundle is required when webhook.generateCert=false (base64 CA that signed the serving cert in webhook.certSecretName)" .Values.webhook.caBundle -}}
{{- end -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc }}
  labels: {{- include "gpu-fleet.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "gpu-fleet.controllerName" . }}
  ports:
    - name: webhook
      port: 443
      targetPort: webhook
{{- if .Values.webhook.generateCert }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.webhook.certSecretName }}
  labels: {{- include "gpu-fleet.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  ca.crt: {{ $caBundle }}
{{- end }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "gpu-fleet.controllerName" . }}-mutating
  labels: {{- include "gpu-fleet.labels" . | nindent 4 }}
webhooks:
  - name: mrun.rq.davidlangworthy.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      caBundle: {{ $caBundle }}
      service:
        name: {{ $svc }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-rq-davidlangworthy-io-v1-run
    rules:
      - apiGroups: ["rq.davidlangworthy.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["runs"]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "gpu-fleet.controllerName" . }}-validating
  labels: {{- include "gpu-fleet.labels" . | nindent 4 }}
webhooks:
  {{- range $wh := list
    (dict "name" "vbudget.rq.davidlangworthy.io" "path" "/validate-rq-davidlangworthy-io-v1-budget" "resource" "budgets")
    (dict "name" "vgpulease.rq.davidlangworthy.io" "path" "/validate-rq-davidlangworthy-io-v1-gpulease" "resource" "gpuleases")
    (dict "name" "vreservation.rq.davidlangworthy.io" "path" "/validate-rq-davidlangworthy-io-v1-reservation" "resource" "reservations")
    (dict "name" "vrun.rq.davidlangworthy.io" "path" "/validate-rq-davidlangworthy-io-v1-run" "resource" "runs") }}
  - name: {{ $wh.name }}
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      caBundle: {{ $caBundle }}
      service:
        name: {{ $svc }}
        namespace: {{ $.Release.Namespace }}
        path: {{ $wh.path }}
    rules:
      - apiGroups: ["rq.davidlangworthy.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["{{ $wh.resource }}"]
  {{- end }}
{{- end }}
